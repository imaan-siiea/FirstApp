<circle cx="120" cy="1820" r="180" fill="#ffffff" fill-opacity="0.04"/>
<text x="540.0" y="150" font-family="Helvetica, Arial, sans-serif" font-size="58" font-weight="800" fill="#ffffff" text-anchor="middle" letter-spacing="-1">Ask anything, get real answers</text>
<text x="540.0" y="214" font-family="Helvetica, Arial, sans-serif" font-size="30" font-weight="500" fill="#ffd66b" text-anchor="middle">Your nonpartisan AI ballot guide</text>
