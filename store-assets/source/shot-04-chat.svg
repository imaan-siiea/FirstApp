  <rect x="190" y="316" width="700" height="1520" rx="70" fill="#0b1828"/>
</g>
<rect x="210" y="336" width="660" height="1480" rx="52" fill="#ffffff"/>
<g clip-path="url(#screenClip)"><g transform="translate(210,336)"><rect x="0" y="0" width="660" height="1480" rx="0" fill="#f8fafc"/><rect x="0" y="0" width="660" height="52" rx="0" fill="#e0f2fe"/><g transform="translate(214,12)"><path d="M 12 1 l 10 4 v 7 c 0 7 -5 11 -10 13 c -5 -2 -10 -6 -10 -13 v -7 z" fill="none" stroke="#0369a1" stroke-width="2.4" stroke-linejoin="round"/><path d="M 8 11 l 3 3 6 -6" fill="none" stroke="#0369a1" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></g><text x="348" y="34" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="600" fill="#0369a1" text-anchor="middle">Nonpartisan · Sourced · Verified</text><rect x="20" y="84" width="560" height="168" rx="16" fill="#ffffff"/><rect x="20" y="236" width="24" height="16" rx="4" fill="#ffffff"/><text x="42" y="124" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="400" fill="#1e293b">Hi! I&#x27;m your nonpartisan civic AI guide. Ask</text><text x="42" y="154" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="400" fill="#1e293b">me anything about candidates, elections,</text><text x="42" y="184" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="400" fill="#1e293b">voting procedures, or civic issues. For</text><text x="42" y="214" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="400" fill="#1e293b">ballot-specific results, enter your address.</text><rect x="168" y="280" width="472" height="96" rx="16" fill="#1e3a5f"/><text x="616" y="318" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="400" fill="#ffffff" text-anchor="end">What does the Texas Railroad</text><text x="616" y="350" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="400" fill="#ffffff" text-anchor="end">Commission actually do?</text><rect x="20" y="404" width="600" height="300" rx="16" fill="#ffffff"/><text x="42" y="444" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="400" fill="#1e293b">Despite its name, the Texas Railroad</text><text x="42" y="475" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="400" fill="#1e293b">Commission doesn&#x27;t regulate railroads — it</text><text x="42" y="506" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="400" fill="#1e293b">oversees the state&#x27;s oil and gas industry,</text><text x="42" y="537" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="400" fill="#1e293b">including drilling permits, pipeline safety,</text><text x="42" y="568" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="400" fill="#1e293b">and natural-gas utilities.</text><text x="42" y="599" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="400" fill="#1e293b"></text><text x="42" y="630" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="400" fill="#1e293b">It&#x27;s led by three statewide-elected</text><text x="42" y="661" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="400" fill="#1e293b">commissioners who serve six-year terms.</text><rect x="0" y="1396" width="660" height="84" rx="0" fill="#ffffff"/><line x1="0" y1="1396" x2="660" y2="1396" stroke="#e2e8f0" stroke-width="1"/><rect x="16" y="1414" width="560" height="52" rx="26" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/><text x="38" y="1447" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="400" fill="#94a3b8">Ask about a candidate or issue...</text><circle cx="608" cy="1440" r="26" fill="#1e3a5f"/><text x="608" y="1450" font-family="Helvetica, Arial, sans-serif" font-size="24" font-weight="700" fill="#ffffff" text-anchor="middle">→</text></g></g>
<rect x="190" y="316" width="700" height="1520" rx="70" fill="none" stroke="#000000" stroke-opacity="0.25" stroke-width="2"/>
