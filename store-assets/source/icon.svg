<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#274b75"/>
      <stop offset="1" stop-color="#16304f"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffd66b"/>
      <stop offset="1" stop-color="#f1a73a"/>
    </linearGradient>
  </defs>

  <!-- full-bleed background -->
  <rect width="1024" height="1024" fill="url(#bg)"/>

  <!-- ballot "bubble" ring -->
  <circle cx="512" cy="520" r="300" fill="none" stroke="#ffffff" stroke-opacity="0.16" stroke-width="34"/>
  <circle cx="512" cy="520" r="232" fill="#ffffff" fill-opacity="0.06"/>

  <!-- bold check (the filled-in vote) -->
  <path d="M 372 528 L 470 632 L 668 408"
        fill="none" stroke="#ffffff" stroke-width="84"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- gold star accent (civic, nonpartisan) -->
  <path fill="url(#gold)" d="M 720 250
        l 26 53 58 8 -42 41 10 58 -52 -27 -52 27 10 -58 -42 -41 58 -8 z"/>
</svg>
